<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機構標準字串複製器</title>
    <style>
        /* --- 1. 抄錄自你檔案的基礎設定 (變數與 Body) --- */
        :root {
            --bg-color: #f3f4f6;
            /* 全局背景色 (淺灰) */
            --card-bg: #ffffff;
            /* 卡片背景色 (純白) */
            --text-primary: #1f2937;
            /* 主文字顏色 (近黑) */
            --accent: #2563eb;
            /* 強調色 (Onshape 藍) */
            --border: #e5e7eb;
            /* 邊框顏色 (極淺灰) */
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            /* 微陰影 */
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            /* 卡片陰影 */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .sidebar-container {
            padding: 16px;
        }

        /* --- 2. 頁首樣式 --- */
        .header {
            border-bottom: 2px solid var(--border);
            padding-bottom: 12px;
            margin-bottom: 12px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        /* --- 3. 誘餌輸入框樣式 (繞過 Onshape 剪貼簿阻擋) --- */
        .input-container {
            margin-bottom: 12px;
        }

        .helper-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 13px;
            box-sizing: border-box;
            background-color: #fff;
            color: var(--text-primary);
            transition: border-color 0.2s;
        }

        .helper-input:focus {
            border-color: var(--accent);
            outline: none;
        }

        .desc-text {
            margin: 4px 0 12px 0;
            font-size: 12px;
            color: #6b7280;
            line-height: 1.4;
        }

        /* --- 4. 將按鈕美化為卡片式懸浮 --- */
        .copy-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .copy-btn {
            display: block;
            width: 100%;
            background-color: var(--card-bg);
            color: var(--text-primary);
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        /* --- 5. 正上方淡綠色提示泡泡 --- */
        .toast {
            position: fixed;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            background-color: #f0fdf4;
            /* 淡綠色背景 */
            color: #166534;
            /* 深綠色文字 */
            border: 1px solid #bbf7d0;
            /* 綠色邊框 */
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            visibility: hidden;
        }

        .toast.show {
            top: 20px;
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>

<body>

    <div class="sidebar-container">
        <div class="header">
            <h1 class="header-title">Frequently used note</h1>
        </div>

        <div class="input-container">
            <input type="text" id="hidden-input" class="helper-input" placeholder="Detail notes will show here">
        </div>

        <p class="desc-text">💡 <b>SOP：</b> Click the card ➔ <b> Ctrl + C ➔ </b>Onshape notes ➔ <b>Ctrl + V。
        </p>

        <div class="copy-grid">
            <button class="copy-btn" data-text="ISO 9227">ISO 9227</button>
            <button class="copy-btn" data-text="linching nut">Clinching nut</button>
            <button class="copy-btn" data-text="ISO 1456">ISO 1456</button>
            <button class="copy-btn" data-text="Draft per 3D">Draft per 3D</button>
            <button class="copy-btn" data-text="DIMENSIONS NOT SHOWN MUST REFER TO 3D MODEL.">Dimension per
                3D</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const buttons = document.querySelectorAll('.copy-btn');
        const toast = document.getElementById('toast');
        const hiddenInput = document.getElementById('hidden-input');
        let toastTimer = null;

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const textToCopy = button.getAttribute('data-text');

                // 核心邏輯：把文字填入輸入框，並強制全選（反白）
                hiddenInput.value = textToCopy;
                hiddenInput.select(); // 自動選取，此時使用者只要按下 Ctrl+C 即可

                // 同時也嘗試往系統剪貼簿塞一次（雖然可能會被 Onshape 阻擋，但當作雙重保險）
                navigator.clipboard.writeText(textToCopy).then(() => {
                    showToast('已為您填入上方框並全選！請按 Ctrl+C 複製');
                }).catch(err => {
                    // 若瀏覽器完全不給寫入剪貼簿，依然提示使用者用輸入框
                    showToast('請按 Ctrl+C 複製上方框內文字！');
                });
            });
        });

        function showToast(msg) {
            if (toastTimer) clearTimeout(toastTimer);
            toast.textContent = msg;
            toast.classList.add('show');
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 2500); // 延長到2.5秒，讓使用者看清提示
        }
    </script>
</body>

</html>
